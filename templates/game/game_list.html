{% extends "base.html" %}
{% block title %}Kho game{% endblock %}
{% block content %}
<style>
  .games-hero {
    background: linear-gradient(135deg, #ff9800 0%, #ffb366 100%);
    color: white;
    padding: 4rem 2rem;
    border-radius: 0 0 2rem 2rem;
    text-align: center;
    box-shadow: 0 10px 30px rgba(255, 152, 0, 0.2);
  }

  .games-hero h1 {
    font-size: 3rem;
    font-weight: 700;
    margin-bottom: 1rem;
  }

  .games-hero p {
    font-size: 1.2rem;
    opacity: 0.95;
  }

  .games-container {
    padding: 3rem 0;
  }

  .game-card {
    position: relative;
    background: var(--bg-card);
    border: 2px solid transparent;
    border-radius: 1.5rem;
    padding: 2rem;
    margin-bottom: 2rem;
    transition: all 0.3s ease;
    cursor: pointer;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .game-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #ff9800, #ffb366);
  }

  .game-card:hover {
    border-color: #ff9800;
    transform: translateY(-8px);
    box-shadow: 0 15px 40px rgba(255, 152, 0, 0.2);
  }

  .game-emoji {
    font-size: 3rem;
    margin-bottom: 1rem;
    text-align: center;
  }

  .game-name {
    font-size: 1.4rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    color: inherit;
  }

  .game-desc {
    font-size: 0.95rem;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
    flex-grow: 1;
  }

  .game-btn {
    background: linear-gradient(135deg, #ff9800 0%, #ffb366 100%);
    border: none;
    color: white;
    padding: 0.8rem 2rem;
    border-radius: 0.75rem;
    font-weight: 600;
    transition: all 0.3s ease;
    display: inline-block;
    text-align: center;
  }

  .game-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(255, 152, 0, 0.3);
    color: white;
    text-decoration: none;
  }

  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2rem;
  }

  @media (max-width: 768px) {
    .games-grid {
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 1.5rem;
    }
    
    .games-hero h1 {
      font-size: 2rem;
    }
    
    .games-hero p {
      font-size: 1rem;
    }
  }
</style>

<div class="games-hero">
  <h1>🎮 Kho Game</h1>
  <p>Thử thách bản thân với các trò chơi vui nhộn</p>
</div>

<div class="container games-container">
  <div class="games-grid">
    {% for game in games %}
    <div class="game-card">
      <div class="game-emoji">{{ game.emoji }}</div>
      <h3 class="game-name">{{ game.name }}</h3>
      <p class="game-desc">{{ game.desc }}</p>
      <a href="{% url game.url_name %}" class="game-btn">▶️ Chơi ngay</a>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
