{% extends "base.html" %}
{% block title %}Guess Number{% endblock %}
{% block content %}

<style>
.box {
    max-width: 420px;
    margin: 60px auto;
    padding: 30px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
}

button {
    padding: 12px 30px;
    border-radius: 12px;
    border: none;
    background: #3498db;
    color: white;
    font-weight: bold;
}

table {
    width: 100%;
    margin-top: 15px;
}
</style>

<div class="box">
    <h2>🔢 Guess The Number</h2>
    <p>Đoán số từ <b>1 → 100</b></p>

    <form method="post">
        {% csrf_token %}
        <input type="number" name="guess" required min="1" max="100"
               placeholder="Nhập số bạn đoán">
        <button>Đoán</button>
    </form>

    <p style="margin-top:10px;">{{ message }}</p>

    <hr>
    <h4>🏆 BXH</h4>
    <table>
        <tr><th>#</th><th>Player</th><th>Lượt</th></tr>
        {% for s in top_scores %}
        <tr>
            <td>{{ forloop.counter }}</td>
            <td>{{ s.user.username }}</td>
            <td>{{ s.attempts }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

{% endblock %}
