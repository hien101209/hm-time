{% extends "base.html" %}
{% block title %}Chess 8x8{% endblock %}

{% block content %}
<style>
.chess-box {
    width: 520px;
    margin: 30px auto;
    text-align: center;
    color: white;
    background: rgba(255,255,255,0.1);
    padding: 20px;
    border-radius: 20px;
}

.board {
    width: 400px;
    aspect-ratio: 1 / 1;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    border: 4px solid white;
}

.cell {
    aspect-ratio: 1 / 1;
    font-size: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    user-select: none;
}

.white { background: #f0d9b5; color: black; }
.black { background: #b58863; color: black; }

.selected {
    outline: 4px solid red;
}

.win {
    font-size: 20px;
    color: gold;
    margin-top: 10px;
}
.move {
    background: radial-gradient(circle, rgba(0,0,0,0.25) 25%, transparent 26%);
}
.capture {
    outline: 3px solid crimson;
}
</style>

<div class="chess-box">
    <h2>♟️ Cờ vua 8x8</h2>
    <p>Chọn quân → chọn ô hợp lệ</p>

    <div id="board" class="board"></div>
    <p id="check" class="win"></p>
    <p id="turn">Lượt: Trắng</p>
    <p id="result" class="win"></p>
    <button onclick="resetGame()" style="margin-top:10px">🔄 Chơi lại</button>
</div>

<script>
const board = document.getElementById("board");
const turnEl = document.getElementById("turn");
const resultEl = document.getElementById("result");

let turn = "W";
let selected = null;
let gameOver = false;
let validMoves = [];

const pieces = [
"♜","♞","♝","♛","♚","♝","♞","♜",
"♟","♟","♟","♟","♟","♟","♟","♟",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"","","","","","","","",
"♙","♙","♙","♙","♙","♙","♙","♙",
"♖","♘","♗","♕","♔","♗","♘","♖"
];

const isWhite = p => "♙♖♘♗♕♔".includes(p);
const isBlack = p => "♟♜♞♝♛♚".includes(p);

function init() {
    validMoves = [];
    board.innerHTML = "";
    pieces.forEach((p, i) => {
        const cell = document.createElement("div");
        const row = Math.floor(i / 8);
        const col = i % 8;
        cell.className = "cell " + ((row + col) % 2 === 0 ? "white" : "black");
        cell.innerText = p;
        cell.onclick = () => clickCell(i);
        board.appendChild(cell);
    });
}

function clickCell(i) {
    if (gameOver) return;

    const piece = pieces[i];

    if (selected === null) {
        if (piece === "") return;
        if (turn === "W" && !isWhite(piece)) return;
        if (turn === "B" && !isBlack(piece)) return;

        selected = i;
        showValidMoves(i);
        board.children[i].classList.add("selected");
    } else {
        if (!isValidMove(selected, i)) {
            selected = null;
            init();
            return;
        }

        if (pieces[i] === "♔" || pieces[i] === "♚") {
            resultEl.innerText = `🏆 ${turn === "W" ? "Trắng" : "Đen"} thắng!`;
            gameOver = true;
        }

        pieces[i] = pieces[selected];
        pieces[selected] = "";
        selected = null;
        turn = turn === "W" ? "B" : "W";
        turnEl.innerText = "Lượt: " + (turn === "W" ? "Trắng" : "Đen");
        init();
        const checkEl = document.getElementById("check");
        checkEl.innerText = "";

        if (isKingInCheck(turn)) {
            checkEl.innerText = "⚠️ CHIẾU!";
        }
    }
}

function isValidMove(from, to) {
    const p = pieces[from];
    const target = pieces[to];

    if (target !== "" &&
        ((isWhite(p) && isWhite(target)) ||
         (isBlack(p) && isBlack(target)))) return false;

    const fx = from % 8, fy = Math.floor(from / 8);
    const tx = to % 8, ty = Math.floor(to / 8);

    const dx = tx - fx;
    const dy = ty - fy;

    // ♙ Tốt trắng
if (p === "♙") {
    // đi 1 ô
    if (dx === 0 && dy === -1 && target === "") return true;

    // đi 2 ô nước đầu
    if (dx === 0 && dy === -2 && fy === 6 &&
        pieces[from - 8] === "" && target === "") return true;

    // ăn chéo
    if (Math.abs(dx) === 1 && dy === -1 &&
        target !== "" && isBlack(target)) return true;

    return false;
}

// ♟ Tốt đen
if (p === "♟") {
    if (dx === 0 && dy === 1 && target === "") return true;

    if (dx === 0 && dy === 2 && fy === 1 &&
        pieces[from + 8] === "" && target === "") return true;

    if (Math.abs(dx) === 1 && dy === 1 &&
        target !== "" && isWhite(target)) return true;

    return false;
}

    // Xe
    if ("♖♜".includes(p))
        return (dx === 0 || dy === 0) && clearPath(from, to);

    // Tượng
    if ("♗♝".includes(p))
        return Math.abs(dx) === Math.abs(dy) && clearPath(from, to);

    // Hậu
    if ("♕♛".includes(p))
        return (dx === 0 || dy === 0 || Math.abs(dx) === Math.abs(dy))
               && clearPath(from, to);

    // Mã
    if ("♘♞".includes(p))
        return Math.abs(dx * dy) === 2;

    // Vua
    if ("♔♚".includes(p))
        return Math.abs(dx) <= 1 && Math.abs(dy) <= 1;

    return false;
}

function clearPath(from, to) {
    const fx = from % 8, fy = Math.floor(from / 8);
    const tx = to % 8, ty = Math.floor(to / 8);

    const stepx = Math.sign(tx - fx);
    const stepy = Math.sign(ty - fy);

    let x = fx + stepx;
    let y = fy + stepy;

    while (x !== tx || y !== ty) {
        if (pieces[y * 8 + x] !== "") return false;
        x += stepx;
        y += stepy;
    }
    return true;
}
function showValidMoves(from) {
    validMoves = [];
    for (let i = 0; i < 64; i++) {
        if (isValidMove(from, i)) {
            validMoves.push(i);
            if (pieces[i] === "")
                board.children[i].classList.add("move");
            else
                board.children[i].classList.add("capture");
        }
    }
}
function isKingInCheck(color) {
    const king = color === "W" ? "♔" : "♚";
    const kingPos = pieces.indexOf(king);

    for (let i = 0; i < 64; i++) {
        if (pieces[i] === "") continue;
        if (color === "W" && isBlack(pieces[i]) &&
            isValidMove(i, kingPos)) return true;

        if (color === "B" && isWhite(pieces[i]) &&
            isValidMove(i, kingPos)) return true;
    }
    return false;
}
function resetGame() {
    location.reload();
}

init();
</script>
{% endblock %}
